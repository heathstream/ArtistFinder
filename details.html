<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Finder</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/details.css">
    <link rel="stylesheet" href="css/colors-fonts.css">
</head>

<body>
    <div class="layout">
        <div class="header">
            <div class="logo"></div>
            <h1>ArtistFinder</h1>
        </div>
        <div class="menu">
            <div class="menuItemGroup">
                <a href="index.html">
                    <div class="menuItem">
                        Home
                    </div>
                </a>
                <a href="artists.html">
                    <div class="menuItem">
                        Artists
                    </div>
                </a>
                <a href="addnew.html">
                    <div class="menuItem">
                        Add new
                    </div>
                </a>
            </div>
        </div>
        <div class="content">
            <div class="detailsSection rounded1">
                <div class="detailsImage">
                    <img id="artistImage" class="rounded1 bordered" src="https://cdn-images.dzcdn.net/images/artist/ebbb1c133ed0220c714b9ed5d254561f/1900x1900-000000-80-0-0.jpg">
                </div>
                <div class="detailsInfo rounded1 bordered">
                    <div class="subHeader">
                        <h2>Details</h2>
                    </div>
                    <div class="detailsInfoEntry">
                        <div class="infoKey">Name:</div>
                        <div id="name" class="infoValue">Gorillaz</div>
                    </div>
                    <div class="detailsInfoEntry">
                        <div class="infoKey">Genre:</div>
                        <div id="genre" class="infoValue">Alternative</div>
                    </div>
                    <div class="detailsInfoEntry">
                        <div class="infoKey">Est. year:</div>
                        <div id="year" class="infoValue">1998</div>
                    </div>
                </div>
            </div>
            <div class="detailsSection rounded1">
                <div id="membersSection" class="detailsTable rounded1 bordered">
                    <div class="subHeader">
                        <h2>Members</h2>
                    </div>
                    <div id="membersTable">
                        <div class="memberRow tableRowTitle">
                            <div class="tableCellTitle">Name</div>
                            <div class="tableCellTitle">Age</div>
                        </div>
                        <div class="memberRow tableRow">
                            <div class="tableCell">2-D</div>
                            <div class="tableCell">25</div>
                        </div>
                        <div id="membersTableBottom" style="height: 2rem;"></div>
                    </div>
                </div>
                <div id="albumsSection" class="detailsTable rounded1 bordered">
                    <div class="subHeader">
                        <h2>Albums</h2>
                    </div>
                    <div id="albumsTable">
                        <div class="albumRow tableRowTitle">
                            <div class="tableCellTitle">Name</div>
                            <div class="tableCellTitle">Year</div>
                        </div>
                        <div class="albumRow tableRow">
                            <div class="tableCell">Gorillaz</div>
                            <div class="tableCell">2001</div>
                        </div>
                        <div id="albumsTableBottom" style="height: 2rem;"></div>
                    </div>
                </div>
            </div>
            <div class="loadingOverlay hidden">
                <p>Loading...</p>
            </div>
        </div>
        <div class="footer">© Anders Hedström</footer>
    </div>
    <script src="./js/details.js" type="module"></script>
</body>

</html>
